version: '3.8'

services:
  db:
    image: mariadb:11
    container_name: fuel-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: Test12
      MYSQL_DATABASE: fuel_calculator_db
    ports:
      - "3308:3306"
    volumes:
      - db_data:/var/lib/mysql

  app:
    #uses locally built image with that name
    image: fuel-consumption:latest
    container_name: fuel-app
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: Test12
      DISPLAY: host.docker.internal:0
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
volumes:
  db_data:
